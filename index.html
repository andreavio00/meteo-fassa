<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Meteo Val di Fassa</title>

<link rel="stylesheet"
      href="style.css">

</head>

<body>

<h1>🏔️ Meteo Val di Fassa</h1>

<div id="stations">
</div>

<h2 class="section-title">📡 Altre stazioni</h2>

<div id="extra-stations">

  <div class="station-card embed-card">
    <div class="station-name">🌲 Vigo di Fassa</div>
    <div class="station-quota">1.400 m &middot; Dolomiti Meteo</div>
    <div class="embed-wrap">
      <iframe
        src="https://stazioni.meteoproject.it/dati/vigodifassa/tabella-vuota.php"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
    <a class="embed-link"
       href="https://www.dolomitimeteo.com/stazione-meteo-vigo/"
       target="_blank" rel="noopener">
      Apri i dati completi ↗
    </a>
  </div>

  <div class="station-card embed-card">
    <div class="station-name">🌲 Pozza di Fassa (Monzon)</div>
    <div class="station-quota">MeteoNetwork</div>
    <div class="embed-wrap">
      <iframe
        src="https://www.meteonetwork.eu/it/weather-station/trn314-stazione-meteorologica-di-monzon"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
    <a class="embed-link"
       href="https://www.meteonetwork.eu/it/weather-station/trn314-stazione-meteorologica-di-monzon"
       target="_blank" rel="noopener">
      Apri i dati completi ↗
    </a>
  </div>

</div>

<script src="app.js"></script>

</body>

</html>
