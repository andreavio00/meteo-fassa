name: Aggiorna dati Vigo e Pozza di Fassa

on:
  schedule:
    # Ogni 15 minuti
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4 tzdata

      - name: Esegui lo scraper
        run: python scripts/fetch_extra_stations.py

      - name: Commit se ci sono cambiamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/extra-stations.json
          git diff --staged --quiet || git commit -m "Aggiorna dati Vigo e Pozza di Fassa [skip ci]"
          git push
